spring.application.name=booking_service
server.port=8082

#postgres & spring
spring.datasource.url=${BOOKING_DB_URL}
spring.datasource.username=postgres
spring.datasource.password=${BOOKING_DB_PASSWORD}
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
logging.level.org.springframework.security=DEBUG
spring.profiles.include=local

#redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis

#minio
minio.url=http://localhost:9000
minio.access.key=${MINIO_ACCESS_KEY}
minio.secret.key=${MINIO_SECRET_KEY}
minio.bucket.name=images

#rabbit
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

#logging
logging.module=BOOKING-SERVICE
logging.output=file
logging.filePath=logs/booking-service.log
